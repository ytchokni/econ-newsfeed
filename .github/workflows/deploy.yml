name: Deploy Backend

on:
  push:
    branches: [main]
    paths-ignore:
      - 'app/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

# Prevent parallel deploys racing each other.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy via SSH
        # Pinned to appleboy/ssh-action v1.2.0 commit SHA.
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: cd /opt/econ-newsfeed && ./scripts/deploy.sh
