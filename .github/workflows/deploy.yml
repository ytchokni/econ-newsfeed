name: Deploy Backend

on:
  push:
    branches: [main]
    paths-ignore:
      - 'app/**'
      - 'docs/**'
      - '*.md'

jobs:
  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: cd /opt/econ-newsfeed && ./scripts/deploy.sh
