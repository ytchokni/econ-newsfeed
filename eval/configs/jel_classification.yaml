description: "JEL Classification — Model Cost Optimization"

providers:
  - id: openrouter:anthropic/claude-sonnet-4.6
    label: "Sonnet 4.6 (ground truth)"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.000003
      outputCost: 0.000015
  - id: openrouter:anthropic/claude-haiku-4.5
    label: "Haiku 4.5"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.000001
      outputCost: 0.000005
  - id: openrouter:google/gemini-3-flash-preview
    label: "Gemini 3 Flash"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.0000005
      outputCost: 0.000003
  - id: openrouter:deepseek/deepseek-chat
    label: "DeepSeek V3.2"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.00000032
      outputCost: 0.00000089
  - id: openrouter:qwen/qwen3.6-plus
    label: "Qwen 3.6 Plus"
    config:
      max_tokens: 16000
      response_format:
        type: json_object
      reasoning:
        enabled: false
      inputCost: 0.000000325
      outputCost: 0.00000195
  - id: openrouter:google/gemma-4-31b-it
    label: "Gemma 4 31B"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.00000014
      outputCost: 0.0000004

prompts:
  - file://../prompts/jel_classification.txt

tests: file://../test_cases/jel_classification.json

defaultTest:
  assert:
    - type: llm-rubric
      value: |
        You are evaluating an LLM's ability to classify an economics researcher into JEL codes.

        The model was given a researcher's bio and asked to return JSON: {"jel_codes": [{"code": "X", "reasoning": "..."}]}.

        Evaluate on:
        1. FORMAT VALIDITY: Is the output valid JSON with a "jel_codes" key? Are codes single uppercase letters (A-Z)? (0 or 1)
        2. CODE RELEVANCE (0-1): Do the assigned JEL codes make sense given the researcher's described research areas? Are obviously relevant codes included? Are irrelevant codes excluded?
        3. REASONING QUALITY (0-1): Does the reasoning clearly connect the bio content to each assigned code?

        Return a score from 0 to 1.
      provider: openrouter:openai/gpt-5.4-mini
