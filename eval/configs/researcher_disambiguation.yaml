description: "Researcher Disambiguation — Model Cost Optimization"

providers:
  - id: openrouter:anthropic/claude-sonnet-4.6
    label: "Sonnet 4.6 (ground truth)"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.000003
      outputCost: 0.000015
  - id: openrouter:anthropic/claude-haiku-4.5
    label: "Haiku 4.5"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.000001
      outputCost: 0.000005
  - id: openrouter:google/gemini-3-flash-preview
    label: "Gemini 3 Flash"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.0000005
      outputCost: 0.000003
  - id: openrouter:deepseek/deepseek-chat
    label: "DeepSeek V3.2"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.00000032
      outputCost: 0.00000089
  - id: openrouter:qwen/qwen3.6-plus
    label: "Qwen 3.6 Plus"
    config:
      max_tokens: 16000
      response_format:
        type: json_object
      reasoning:
        enabled: false
      inputCost: 0.000000325
      outputCost: 0.00000195
  - id: openrouter:google/gemma-4-31b-it
    label: "Gemma 4 31B"
    config:
      max_tokens: 2000
      response_format:
        type: json_object
      inputCost: 0.00000014
      outputCost: 0.0000004

prompts:
  - file://../prompts/researcher_disambiguation.txt

tests: file://../test_cases/researcher_disambiguation.json

defaultTest:
  assert:
    - type: is-json
    - type: llm-rubric
      value: |
        You are evaluating an LLM's ability to disambiguate researcher names.

        The model was given an author name and a list of candidate researchers with the same last name. It should return JSON: {"match_id": <id or null>}.

        Evaluate on:
        1. FORMAT: Is the output valid JSON with a "match_id" key? (0 or 1)
        2. CORRECTNESS: Does the match_id make sense given the names? "J. Smith" should match "John Smith". Completely different first names should return null. (0 or 1)

        Return a score from 0 to 1.
      provider: openrouter:openai/gpt-5.4-mini
