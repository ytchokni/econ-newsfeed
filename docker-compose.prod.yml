# Production override — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this changes from the base docker-compose.yml:
# - Removes the frontend service (Vercel handles it)
# - Sets restart: always (survive reboots)
# - Passes FRONTEND_URL and OPENALEX env vars through
# - Sets WEB_CONCURRENCY=1 (single async worker handles the traffic; saves ~150MB)

services:
  db:
    restart: always

  api:
    restart: always
    environment:
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      OPENALEX_MAILTO: ${OPENALEX_MAILTO:-}
      OPENALEX_DAILY_BUDGET: ${OPENALEX_DAILY_BUDGET:-1000}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      ENRICHMENT_WORKER_ENABLED: ${ENRICHMENT_WORKER_ENABLED:-false}
      EXTRACTION_WORKER_ENABLED: ${EXTRACTION_WORKER_ENABLED:-false}
      EXTRACTION_DELAY_SECONDS: ${EXTRACTION_DELAY_SECONDS:-2}
      SCRAPE_ON_STARTUP: ${SCRAPE_ON_STARTUP:-true}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-48}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DIGEST_FROM_EMAIL: ${DIGEST_FROM_EMAIL:-digest@econ-newsfeed.com}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GOOGLE_CSE_API_KEY: ${GOOGLE_CSE_API_KEY:-}
      GOOGLE_CSE_CX: ${GOOGLE_CSE_CX:-}
      DISCOVERY_DAILY_LIMIT: ${DISCOVERY_DAILY_LIMIT:-100}

  frontend:
    profiles:
      - disabled
