services:
  db:
    image: mysql:8.0.40
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-econ_newsfeed}
      MYSQL_USER: ${DB_USER:-econ_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    mem_limit: 384m
    cpus: 1.0
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-econ_app}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-econ_newsfeed}
      PARASAIL_API_KEY: ${PARASAIL_API_KEY:?PARASAIL_API_KEY is required}
      LLM_MODEL: ${LLM_MODEL:-google/gemma-4-31b-it}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-24}
      SCRAPE_ON_STARTUP: ${SCRAPE_ON_STARTUP:-false}
      SCRAPE_API_KEY: ${SCRAPE_API_KEY:?SCRAPE_API_KEY is required}
      SCRAPE_RATE_LIMIT_SECONDS: ${SCRAPE_RATE_LIMIT_SECONDS:-2}
      CONTENT_MAX_CHARS: ${CONTENT_MAX_CHARS:?CONTENT_MAX_CHARS is required}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      API_INTERNAL_URL: http://api:8000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

volumes:
  mysql_data:
